apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "distributed-flagd.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "distributed-flagd.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "distributed-flagd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "distributed-flagd.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "distributed-flagd.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: flagd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ETCD_ENDPOINT
              value: {{ .Values.etcd.endpoints | quote }}
            - name: GRPC_ADDR
              value: {{ .Values.flagd.grpcAddr | quote }}
            - name: HTTP_ADDR
              value: {{ .Values.flagd.httpAddr | quote }}
            - name: DEFAULT_MODEL_ID
              value: {{ .Values.flagd.defaultModelID | quote }}
            - name: CONTROLLER_NAMESPACE
              value: {{ .Values.controller.namespace | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
