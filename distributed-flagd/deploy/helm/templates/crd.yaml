{{- if .Values.installCRD }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: flagdefinitions.flagd.lensai.io
  labels:
    {{- include "distributed-flagd.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: flagd.lensai.io
  names:
    kind: FlagDefinition
    listKind: FlagDefinitionList
    plural: flagdefinitions
    singular: flagdefinition
    shortNames:
      - fd
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: FlagDefinition declares a feature flag that the distributed-flagd controller syncs to etcd.
          type: object
          required: [spec]
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [flagKey]
              properties:
                flagKey:
                  type: string
                  minLength: 1
                  maxLength: 255
                enabled:
                  type: boolean
                  default: true
                value:
                  type: string
                variants:
                  type: array
                  maxItems: 20
                  items:
                    type: object
                    required: [value, weight]
                    properties:
                      value:
                        type: string
                        minLength: 1
                      weight:
                        type: integer
                        minimum: 0
                        maximum: 100
            status:
              type: object
              properties:
                syncedAt:
                  type: string
                syncedRevision:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: [True, False, Unknown]
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: FlagKey
          type: string
          jsonPath: .spec.flagKey
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: Synced
          type: string
          jsonPath: .status.syncedAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
