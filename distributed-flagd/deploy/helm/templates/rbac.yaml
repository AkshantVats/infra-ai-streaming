{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "distributed-flagd.fullname" . }}-controller
  labels:
    {{- include "distributed-flagd.labels" . | nindent 4 }}
rules:
  - apiGroups: ["flagd.lensai.io"]
    resources: ["flagdefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["flagd.lensai.io"]
    resources: ["flagdefinitions/status"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "distributed-flagd.fullname" . }}-controller
  labels:
    {{- include "distributed-flagd.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "distributed-flagd.fullname" . }}-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "distributed-flagd.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
