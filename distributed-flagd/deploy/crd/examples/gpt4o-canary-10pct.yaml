apiVersion: flagd.lensai.io/v1alpha1
kind: FlagDefinition
metadata:
  name: demo-tenant-model-rollout
  namespace: default
  labels:
    app.kubernetes.io/component: model-rollout
    lensai.io/day: "24"
spec:
  flagKey: "model-rollout:demo-tenant"
  enabled: true
  variants:
    # Phase 1 — shadow canary: 10% of requests routed to gpt-4o
    - value: "gpt-4o-mini"
      weight: 90
    - value: "gpt-4o"
      weight: 10
