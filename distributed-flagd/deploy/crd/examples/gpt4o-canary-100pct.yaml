apiVersion: flagd.lensai.io/v1alpha1
kind: FlagDefinition
metadata:
  name: demo-tenant-model-rollout
  namespace: default
  labels:
    app.kubernetes.io/component: model-rollout
    lensai.io/day: "24"
spec:
  flagKey: "model-rollout:demo-tenant"
  enabled: true
  variants:
    # Phase 3 — full cutover: 100% traffic on gpt-4o
    - value: "gpt-4o-mini"
      weight: 0
    - value: "gpt-4o"
      weight: 100
