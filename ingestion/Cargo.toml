[package]
name = "ingestion"
version = "0.1.0"
edition = "2021"
description = "HTTP ingestion hot path for infra-ai-streaming"

[lib]
path = "src/lib.rs"

[[bin]]
name = "ingestion"
path = "src/main.rs"

[dependencies]
axum = { version = "0.8", features = ["json", "http1", "tokio"] }
tower = { version = "0.5", features = ["limit", "util"] }
tower-http = { version = "0.6", features = ["trace", "timeout"] }
tokio = { version = "1", features = ["full"] }
rdkafka = { version = "0.39", features = ["cmake-build"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
redis = { version = "1.2", features = ["tokio-comp", "script"] }
