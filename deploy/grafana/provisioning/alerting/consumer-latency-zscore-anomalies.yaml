apiVersion: 1
groups:
  - orgId: 1
    name: consumer-latency-zscore-anomalies
    folder: Consumer Anomalies
    interval: 60s
    rules:
      - uid: consumer-latency-zscore-anom
        title: "Consumer — latency z-score anomalies"
        condition: B
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Inference latency anomalies detected via z-score (ai_anomalies topic)."
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: increase(anomalies_detected_total[5m])
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  query:
                    params: [A]

