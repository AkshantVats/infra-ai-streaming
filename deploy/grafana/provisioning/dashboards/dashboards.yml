apiVersion: 1

providers:
  - name: infra-ai-streaming
    orgId: 1
    folder: AI Inference
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
