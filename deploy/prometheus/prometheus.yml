# Scrape ingestion HTTP /metrics on host (Rust binary runs outside compose).
# Consumer metrics on :9091 are a Day 5 placeholder job.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ingestion
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: consumer
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9091"]
