# Scrape ingestion (:8080) and consumer (:9091) on the host via host.docker.internal.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ingestion
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: consumer
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9091"]
