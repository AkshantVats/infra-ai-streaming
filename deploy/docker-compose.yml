# Local dependencies: Redis, Redpanda (Kafka-compatible API), ClickHouse.
#
#   cp deploy/.env.example deploy/.env
#
# From repo root (recommended — loads deploy/.env for interpolation and service env):
#   docker compose --env-file deploy/.env -f deploy/docker-compose.yml up -d
#
# Or from deploy/ (project directory is deploy/; compose resolves env_file paths here):
#   cd deploy && docker compose up -d
#
# Kafka from the host: KAFKA_BROKERS=127.0.0.1:9092 (published port maps to Redpanda’s
# external listener). From another container on this network: redpanda:9092 (internal).

name: infra-ai-streaming

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    env_file:
      - .env
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://127.0.0.1:9092
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --check=false
      - --mode
      - dev-container
      - --default-log-level=warn
    ports:
      - "9092:19092"
      - "9644:9644"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rpk cluster metadata --brokers 127.0.0.1:9092 >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  clickhouse-init:
    image: clickhouse/clickhouse-server:24.12-alpine
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./clickhouse/init.sql:/init.sql:ro
    env_file:
      - .env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "until clickhouse-client --host clickhouse --query 'SELECT 1' 2>/dev/null; do sleep 1; done; clickhouse-client --host clickhouse --multiquery < /init.sql"
    restart: "no"

volumes:
  clickhouse_data:
    name: infra_ai_clickhouse_data
