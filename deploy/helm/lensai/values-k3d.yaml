# k3d / laptop overrides — use with:
#   helm upgrade --install lensai deploy/helm/lensai -n lensai --create-namespace -f deploy/helm/lensai/values-k3d.yaml

ingestion:
  image:
    pullPolicy: Never
  replicas: 2

consumer:
  image:
    pullPolicy: Never
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetAverageValue: "500"

redis:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 150m
      memory: 64Mi

clickhouse:
  storage: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

redpanda:
  memory: 512M
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 350m
      memory: 512Mi

prometheus:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 150m
      memory: 256Mi

ingestion:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

consumer:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

prometheusAdapter:
  enabled: true
