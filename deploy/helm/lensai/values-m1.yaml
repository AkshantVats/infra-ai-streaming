# M1 Mac / low-RAM laptop — use instead of values-k3d.yaml for k3d:
#   helm upgrade --install lensai deploy/helm/lensai -n lensai --create-namespace \
#     -f deploy/helm/lensai/values-m1.yaml
# Do not run k3d + docker compose full stack at the same time.

ingestion:
  replicas: 1

consumer:
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 2

clickhouse:
  storage: 5Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

redpanda:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "0.5"
      memory: 768Mi

prometheusAdapter:
  enabled: false
