# M1 Mac / low-RAM laptop — use instead of values-k3d.yaml for k3d:
#   helm upgrade --install lensai deploy/helm/lensai -n lensai --create-namespace \
#     -f deploy/helm/lensai/values-m1.yaml
# Do not run k3d + docker compose full stack at the same time.

ingestion:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

consumer:
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 150m
      memory: 64Mi

redpanda:
  memory: 512M
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 350m
      memory: 512Mi

clickhouse:
  storage: 5Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

prometheus:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 150m
      memory: 256Mi

prometheusAdapter:
  enabled: false
