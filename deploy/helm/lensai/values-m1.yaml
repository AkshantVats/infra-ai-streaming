# M1 Mac / low-RAM laptop — use with ./scripts/e2e-k3d-full.sh or:
#   helm upgrade --install lensai deploy/helm/lensai -n lensai --create-namespace \
#     -f deploy/helm/lensai/values-m1.yaml
# Do not run k3d + docker compose full stack at the same time.

ingestion:
  image:
    pullPolicy: Never
  replicas: 1
  wal:
    persistence:
      enabled: true
      size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  probes:
    readiness:
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6
    liveness:
      initialDelaySeconds: 45
      periodSeconds: 15

consumer:
  image:
    pullPolicy: Never
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi
  probes:
    readiness:
      initialDelaySeconds: 20
      periodSeconds: 10
      failureThreshold: 6
    liveness:
      initialDelaySeconds: 45
      periodSeconds: 15

redis:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 150m
      memory: 64Mi

redpanda:
  memory: 1G
  topicPartitions: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 1536Mi
  probes:
    readiness:
      initialDelaySeconds: 25
      periodSeconds: 10
      timeoutSeconds: 15
      failureThreshold: 6
    liveness:
      initialDelaySeconds: 45
      periodSeconds: 15
      timeoutSeconds: 15

clickhouse:
  storage: 5Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  probes:
    readiness:
      initialDelaySeconds: 25
      periodSeconds: 10
      failureThreshold: 6
    liveness:
      initialDelaySeconds: 40
      periodSeconds: 15

prometheus:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 150m
      memory: 256Mi

prometheusAdapter:
  enabled: false
