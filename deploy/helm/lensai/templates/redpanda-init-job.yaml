{{- if .Values.redpanda.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "lensai.fullname" . }}-redpanda-init
  labels:
    {{- include "lensai.labels" . | nindent 4 }}
    app.kubernetes.io/component: redpanda-init
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redpanda-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: {{ .Values.redpanda.image }}
          env:
            - name: KAFKA_BROKERS
              value: {{ .Values.kafka.brokers | quote }}
            - name: KAFKA_TOPIC
              value: {{ .Values.kafka.topic | quote }}
            - name: KAFKA_DLQ_TOPIC
              value: {{ .Values.kafka.dlqTopic | quote }}
            - name: KAFKA_ANOMALIES_TOPIC
              value: {{ .Values.kafka.anomaliesTopic | quote }}
            - name: KAFKA_TOPIC_PARTITIONS
              value: {{ .Values.redpanda.topicPartitions | quote }}
          command: ["/bin/sh", "/init-topics.sh"]
          volumeMounts:
            - name: script
              mountPath: /init-topics.sh
              subPath: init-topics.sh
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: {{ include "lensai.fullname" . }}-redpanda-init
            defaultMode: 0555
{{- end }}
