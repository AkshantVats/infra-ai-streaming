{{- if .Values.redpanda.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "lensai.fullname" . }}-redpanda
  labels:
    {{- include "lensai.labels" . | nindent 4 }}
    app.kubernetes.io/component: redpanda
spec:
  serviceName: redpanda
  replicas: {{ .Values.redpanda.replicas }}
  selector:
    matchLabels:
      {{- include "lensai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redpanda
  template:
    metadata:
      labels:
        {{- include "lensai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redpanda
    spec:
      containers:
        - name: redpanda
          image: {{ .Values.redpanda.image }}
          command:
            - /bin/sh
            - -ec
            - |
              FQDN="$(hostname -f)"
              exec /usr/bin/rpk redpanda start \
                --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092 \
                --advertise-kafka-addr "internal://${FQDN}:9092,external://127.0.0.1:9092" \
                --rpc-addr 0.0.0.0:33145 \
                --advertise-rpc-addr "${FQDN}:33145" \
                --smp 1 \
                --memory {{ .Values.redpanda.memory | quote }} \
                --reserve-memory 0M \
                --overprovisioned \
                --check=false \
                --mode dev-container \
                --default-log-level=warn
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 9644
              name: admin
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - rpk cluster metadata --brokers 127.0.0.1:9092 >/dev/null 2>&1
            {{- include "lensai.execProbeTiming" (list (dig "probes" "liveness" dict .Values.redpanda) (dict "initialDelaySeconds" 30 "periodSeconds" 15 "timeoutSeconds" 10 "failureThreshold" 3)) | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - rpk cluster metadata --brokers 127.0.0.1:9092 >/dev/null 2>&1
            {{- include "lensai.execProbeTiming" (list (dig "probes" "readiness" dict .Values.redpanda) (dict "initialDelaySeconds" 15 "periodSeconds" 10 "timeoutSeconds" 10 "failureThreshold" 3)) | nindent 12 }}
          resources:
            {{- toYaml .Values.redpanda.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  labels:
    {{- include "lensai.labels" . | nindent 4 }}
    app.kubernetes.io/component: redpanda
spec:
  clusterIP: None
  selector:
    {{- include "lensai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redpanda
  ports:
    - port: 9092
      targetPort: kafka
      name: kafka
    - port: 9644
      targetPort: admin
      name: admin
{{- end }}
