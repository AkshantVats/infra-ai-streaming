{{- if .Values.redpanda.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lensai.fullname" . }}-redpanda-init
  labels:
    {{- include "lensai.labels" . | nindent 4 }}
    app.kubernetes.io/component: redpanda
data:
  init-topics.sh: |
{{ .Files.Get "files/redpanda-init-topics.sh" | indent 4 }}
{{- end }}
