{{- if .Values.clickhouse.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "lensai.fullname" . }}-clickhouse-init
  labels:
    {{- include "lensai.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse-init
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/component: clickhouse-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: {{ .Values.clickhouse.image }}
          command:
            - /bin/sh
            - -c
            - |
              until clickhouse-client --host clickhouse --query 'SELECT 1' 2>/dev/null; do sleep 2; done
              clickhouse-client --host clickhouse --multiquery < /init.sql
          volumeMounts:
            - name: init-sql
              mountPath: /init.sql
              subPath: init.sql
              readOnly: true
      volumes:
        - name: init-sql
          configMap:
            name: {{ include "lensai.fullname" . }}-clickhouse-init
{{- end }}
