version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      rust-minor-patch:
        patterns: ["*"]
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]

  - package-ecosystem: "gomod"
    directory: "/consumer"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        patterns: ["*"]
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
