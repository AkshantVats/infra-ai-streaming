name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ingestion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (rdkafka / cmake-build)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev libsasl2-dev libzstd-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cargo test (ingestion)
        run: cargo test -p ingestion --verbose
