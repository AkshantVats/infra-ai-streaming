name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (rdkafka / cmake-build)
        run: |
          sudo apt-get update
          # libcurl4-openssl-dev: librdkafka's cmake build can still compile units
          # that include curl/curl.h even when WITH_CURL=0 (see rdkafka-sys build).
          sudo apt-get install -y cmake pkg-config libssl-dev libsasl2-dev libzstd-dev libcurl4-openssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          # tonic 0.14.x (via opentelemetry-otlp 0.32) requires Rust 1.88+
          toolchain: "1.88"
          components: rustfmt, clippy

      - name: Cargo fmt (check)
        run: cargo fmt --check

      - name: Cargo clippy (deny warnings, all targets)
        run: cargo clippy -p ingestion --all-targets -- -D warnings

      - name: Cargo test (ingestion)
        run: cargo test -p ingestion --verbose

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: consumer/go.mod
          cache-dependency-path: consumer/go.sum

      - name: gofmt (check)
        run: |
          cd consumer
          test -z "$(gofmt -l .)"

      - name: Go test (consumer)
        run: cd consumer && go test ./...

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v5
        with:
          version: v3.16.0

      - name: Helm dependency update
        run: helm dependency update deploy/helm/lensai

      - name: Helm template (values-m1.yaml)
        run: helm template lensai deploy/helm/lensai -n lensai -f deploy/helm/lensai/values-m1.yaml >/dev/null

      - name: Helm template (values-dev.yaml)
        run: helm template lensai deploy/helm/lensai -n lensai -f deploy/helm/lensai/values-dev.yaml >/dev/null

      - name: bash -n run.sh
        run: bash -n scripts/run.sh

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: shellcheck
        run: |
          shellcheck -x \
            chaos/*.sh \
            deploy/k3d/*.sh \
            deploy/helm/lensai/files/*.sh \
            deploy/redpanda/*.sh \
            scripts/*.sh \
            scripts/lib/*.sh

      - name: bash -n (syntax)
        run: |
          bash -n chaos/*.sh
          bash -n deploy/k3d/*.sh
          bash -n deploy/helm/lensai/files/*.sh
          bash -n deploy/redpanda/*.sh
          bash -n scripts/*.sh
          bash -n scripts/lib/*.sh

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── k3d E2E — runs on every PR (and push to main) ────────────────────────────
  # This job builds Docker images from source, deploys via Helm to a local k3d
  # cluster, and runs the smoke E2E script. It catches breakage that unit tests
  # cannot (image build failures, Helm template regressions, service startup issues).
  e2e-k3d:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [rust, go, helm, shell]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Rust / rdkafka preflight)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev libsasl2-dev libzstd-dev libcurl4-openssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - uses: actions/setup-go@v5
        with:
          go-version-file: consumer/go.mod
          cache-dependency-path: consumer/go.sum

      - uses: azure/setup-helm@v5
        with:
          version: v3.16.0

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Build metadata for images
        run: |
          echo "GIT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Full M1 E2E (k3d + Helm)
        env:
          GIT_SHA: ${{ env.GIT_SHA }}
          BUILD_TIME: ${{ env.BUILD_TIME }}
          HELM_WAIT_TIMEOUT: 5m
          POD_WAIT_TIMEOUT: 300s
          SMOKE_PF_WARMUP_SEC: 15
          SMOKE_CURL_RETRIES: 20
          SMOKE_CH_WAIT_SEC: 90
        run: timeout 25m ./scripts/run.sh --profile m1 --skip-chaos

      - name: Upload E2E proof snippet on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-k3d-proof-tail
          path: docs/E2E-PROOF-K3D.md
          retention-days: 14
